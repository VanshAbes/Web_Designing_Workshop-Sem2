<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Stack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer">
        <h1>Enter Employee Detail!!</h1>
        <div class="enter_text">
            <input type="text" id="employee_name" placeholder="Enter Name"><br>
            <input type="text" id="employee_number" placeholder="Enter Employee ID"><br>
            <input type="number" id="employee_salary" placeholder="Enter Salary"><br>
            <input type="text" id="employee_dept" placeholder="Enter Department"><br>
        </div>

        <div class="buttons">

            <center>
            <button id="addemployee">Add Employee</button><br>
            <button id="salary_sort">Salary > 50000</button>
            <button id="display_employee">Display Employee</button>
            <button id="total_salary">Total Salary</button>
            <button id="average_salary">Average Salary</button><br>
            <button id="dept_segregate">Sort by Departmnet</button>
            </center>
        </div>

        <div id="output"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
